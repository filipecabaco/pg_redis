name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  CARGO_INCREMENTAL: "0"
  CARGO_PGRX_VERSION: "0.18.0"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        id: rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            pkg-config \
            libreadline-dev \
            zlib1g-dev \
            clang

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          shared-key: "check"
          cache-on-failure: "true"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --features pg17 --lib --bins -- -D warnings

      - name: Print sccache stats
        run: sccache --show-stats

  test:
    name: Test (pg${{ matrix.pg }})
    needs: [check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        id: rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            pkg-config \
            libreadline-dev \
            zlib1g-dev \
            clang

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          shared-key: "pg${{ matrix.pg }}"
          cache-on-failure: "true"

      - name: Cache pgrx data dir
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-${{ env.CARGO_PGRX_VERSION }}-pg${{ matrix.pg }}

      - name: Cache cargo-pgrx binary
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-bin-${{ env.CARGO_PGRX_VERSION }}-${{ steps.rust.outputs.rustc-hash }}

      - name: Install cargo-pgrx
        run: cargo pgrx --version 2>/dev/null | grep -q "${{ env.CARGO_PGRX_VERSION }}" || cargo install cargo-pgrx --version "=${{ env.CARGO_PGRX_VERSION }}" --locked

      - name: Initialize pgrx for pg${{ matrix.pg }}
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Run unit tests
        run: cargo pgrx test pg${{ matrix.pg }}

      - name: Check regression test files exist
        run: |
          [ -d sql ] && [ "$(ls sql/*.sql 2>/dev/null | wc -l)" -gt 0 ] \
            || { echo "No pg_regress SQL files found in sql/ — skipping regress"; exit 0; }

      - name: Run pg_regress e2e tests
        run: cargo pgrx regress pg${{ matrix.pg }}

      - name: Print sccache stats
        run: sccache --show-stats
