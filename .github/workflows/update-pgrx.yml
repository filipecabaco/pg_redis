name: Update pgrx

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:
  push:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: update-pgrx
  cancel-in-progress: true

jobs:
  update-pgrx:
    name: Check and update pgrx
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get current pgrx version
        id: current
        run: |
          set -euo pipefail
          VERSION=$(grep '^  CARGO_PGRX_VERSION:' .github/workflows/ci.yml | sed 's/.*: "//' | tr -d '"')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: could not parse current pgrx version from ci.yml (got: '$VERSION')" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get latest pgrx version from crates.io
        id: latest
        run: |
          set -euo pipefail
          LATEST=$(curl -sf --connect-timeout 10 --max-time 30 \
            -H "User-Agent: pg_redis-ci-updater (github.com/filipecabaco/pg_redis)" \
            https://crates.io/api/v1/crates/pgrx \
            | jq -r '.crate.max_stable_version // .crate.max_version')
          if [[ ! "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: unexpected version from crates.io (got: '$LATEST')" >&2
            exit 1
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Check for existing PR or branch
        id: existing
        if: steps.latest.outputs.version != steps.current.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          NEW: ${{ steps.latest.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="update-pgrx-${NEW}"
          # Check open AND merged/closed PRs to avoid re-opening for an already-handled version
          PR=$(gh pr list --head "$BRANCH" --state all --json number --jq '.[0].number // empty')
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        if: steps.latest.outputs.version != steps.current.outputs.version && steps.existing.outputs.pr == ''
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Update pgrx version in files
        if: steps.latest.outputs.version != steps.current.outputs.version && steps.existing.outputs.pr == ''
        env:
          OLD: ${{ steps.current.outputs.version }}
          NEW: ${{ steps.latest.outputs.version }}
        run: |
          set -euo pipefail

          # Use | as sed delimiter to avoid conflicts with version dots
          sed -i "s|CARGO_PGRX_VERSION: \"${OLD}\"|CARGO_PGRX_VERSION: \"${NEW}\"|" .github/workflows/ci.yml
          sed -i "s|pgrx = \"=${OLD}\"|pgrx = \"=${NEW}\"|" Cargo.toml
          sed -i "s|pgrx-tests = \"=${OLD}\"|pgrx-tests = \"=${NEW}\"|" Cargo.toml

          # Cargo.toml already pins the new version; update the lock file to match
          cargo update -p pgrx -p pgrx-tests

      - name: Open pull request
        if: steps.latest.outputs.version != steps.current.outputs.version && steps.existing.outputs.pr == ''
        env:
          GH_TOKEN: ${{ github.token }}
          OLD: ${{ steps.current.outputs.version }}
          NEW: ${{ steps.latest.outputs.version }}
          BRANCH: ${{ steps.existing.outputs.branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .github/workflows/ci.yml Cargo.toml Cargo.lock
          git commit -m "chore: update pgrx ${OLD} -> ${NEW}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update pgrx ${OLD} -> ${NEW}" \
            --body "Automated update of pgrx from \`${OLD}\` to \`${NEW}\`.

Changes:
- \`.github/workflows/ci.yml\`: \`CARGO_PGRX_VERSION\`
- \`Cargo.toml\`: \`pgrx\` and \`pgrx-tests\` dependencies
- \`Cargo.lock\`: updated lock entries

CI will run the full test matrix (pg15, pg16, pg17) automatically." \
            --base main \
            --head "$BRANCH"

      - name: Already up to date
        if: steps.latest.outputs.version == steps.current.outputs.version
        run: echo "pgrx is already at the latest version (${{ steps.current.outputs.version }})"
