site_name: pg_redis
site_description: Redis protocol support for PostgreSQL — backed by real SQL tables
site_url: https://filipecabaco.github.io/pg_redis
repo_url: https://github.com/filipecabaco/pg_redis
repo_name: filipecabaco/pg_redis
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Filipe Cabaço — MIT License

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/supabase.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/filipecabaco/pg_redis
    - icon: simple/supabase
      link: https://supabase.com

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Configuration: configuration.md
  - Reference:
      - Commands: commands.md
      - Command coverage: command-coverage.md
      - Storage modes: storage-modes.md
      - Pub/Sub routing: pubsub.md
  - Performance:
      - Benchmarks: benchmarks.md
  - Contributing:
      - Development: development.md
