[vars]
pg_version = "pg17"

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks.lint]
description = "Lint with clippy (warnings as errors)"
run = "cargo clippy --features {{vars.pg_version}} -- -D warnings"

[tasks.build]
description = "Build the extension"
run = "cargo build --features {{vars.pg_version}}"

[tasks.run]
description = "Start a local postgres with the extension hot-reloaded"
run = "cargo pgrx run {{vars.pg_version}}"

[tasks.test-unit]
description = "Run unit tests (no postgres required)"
run = "cargo test --features {{vars.pg_version}} --lib -- --skip pg_test"

[tasks.test-pg]
description = "Run integration tests with pgrx managed postgres"
run = "cargo pgrx test {{vars.pg_version}}"

[tasks.test]
description = "Run all tests (unit + pgrx integration)"
depends = ["test-unit", "test-pg"]

[tasks.e2e]
description = "Run end-to-end tests in Docker (redis-cli based)"
run = [
  "docker compose --profile e2e up --build --abort-on-container-exit --exit-code-from e2e",
  "docker compose --profile e2e down -v",
]

[tasks.clients]
description = "Run client-compatibility e2e tests in Docker (node-redis, ioredis)"
run = [
  "docker compose --profile clients up --build --abort-on-container-exit --exit-code-from clients",
  "docker compose --profile clients down -v",
]

[tasks.bench]
description = "Run the full redis-benchmark suite against pg_redis (:6379) and Redis (:6380)"
run = """
set -e
docker compose --profile bench up -d --build --wait
trap 'docker compose --profile bench down' EXIT INT TERM
sleep 2

run_suite() {
  label=$1; host=$2
  echo ''
  echo "══ $label ═══════════════════════════════════════════"
  for t in ping set get incr lpush rpush lpop rpop sadd hset spop zadd zpopmin lrange mset; do
    docker compose exec -T redis redis-benchmark \\
        -h $host -p 6379 -a testpass -n 20000 -c 50 -q -t $t 2>/dev/null \\
      | tr '\\r' '\\n' \\
      | grep 'requests per second' \\
      || echo " $t: <connection closed>"
  done
}

run_suite 'Redis 7 (reference)' redis
run_suite 'pg_redis' postgres
"""

[tasks.bench-high-write]
description = "High-concurrency write benchmark: 8 workers, batch_size=256, 200 clients"
run = """
set -e
PG_REDIS_WORKERS=8 PG_REDIS_BATCH_SIZE=256 docker compose --profile bench up -d --build --wait
trap 'docker compose --profile bench down' EXIT INT TERM
sleep 2

run_suite() {
  label=$1; host=$2
  echo ''
  echo "══ $label ═══════════════════════════════════════════"
  for t in set get incr hset zadd lpop sadd zpopmin rpop spop; do
    docker compose exec -T redis redis-benchmark \\
        -h $host -p 6379 -a testpass -n 50000 -c 200 -q -t $t 2>/dev/null \\
      | tr '\\r' '\\n' \\
      | grep 'requests per second' \\
      || echo " $t: <connection closed>"
  done
}

run_suite 'Redis 7 (reference, 200 clients)' redis
run_suite 'pg_redis (8 workers, batch_size=256, 200 clients)' postgres
"""
