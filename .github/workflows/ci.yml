name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            pkg-config \
            libreadline-dev \
            zlib1g-dev \
            clang

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.pgrx
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Install cargo-pgrx
        run: cargo pgrx --version 2>/dev/null | grep -q "0.16.1" || cargo install cargo-pgrx --version "=0.16.1" --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg17 download

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (pg${{ matrix.pg }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libssl-dev \
            pkg-config \
            libreadline-dev \
            zlib1g-dev \
            clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.pgrx
            target
          key: ${{ runner.os }}-cargo-pg${{ matrix.pg }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pg${{ matrix.pg }}-

      - name: Install cargo-pgrx
        run: cargo pgrx --version 2>/dev/null | grep -q "0.16.1" || cargo install cargo-pgrx --version "=0.16.1" --locked

      - name: Initialize pgrx for pg${{ matrix.pg }}
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Diagnose environment before tests
        run: |
          echo "=== Listeners on :6379 ==="
          ss -tlnp 2>&1 | grep -E ":6379|State" || echo "no listener on 6379"
          echo "=== /etc/hosts ==="
          cat /etc/hosts
          echo "=== redis-cli availability ==="
          which redis-cli || echo "no redis-cli"
          echo "=== postgres binaries ==="
          ls -la ~/.pgrx/*/pgrx-install/bin/ 2>/dev/null | head -20 || true

      - name: Run unit tests
        run: cargo pgrx test pg${{ matrix.pg }}

      - name: Run pg_regress e2e tests
        run: cargo pgrx regress pg${{ matrix.pg }}
